<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#0d1b2e"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="250" y1="65" x2="950" y2="285" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37d5ff"/>
      <stop offset="0.48" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.35 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="moonGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.75 0 0 0 0 1 0 0 0 0.34 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <mask id="crescentMoon">
      <rect width="1200" height="360" fill="white"/>
      <circle cx="1001" cy="73" r="30" fill="black"/>
    </mask>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <g opacity="0.82">
    <circle cx="976" cy="74" r="30" fill="#e2e8f0" mask="url(#crescentMoon)" filter="url(#moonGlow)">
      <animate attributeName="opacity" values="0.72;0.92;0.72" dur="6.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#f8fafc" opacity="0.76">
    <path d="M113 102L117 113L128 117L117 121L113 132L109 121L98 117L109 113Z">
      <animate attributeName="opacity" values="0.35;0.92;0.35" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <path d="M1077 124L1080 132L1088 135L1080 138L1077 146L1074 138L1066 135L1074 132Z">
      <animate attributeName="opacity" values="0.2;0.78;0.2" dur="5.6s" repeatCount="indefinite"/>
    </path>
    <path d="M990 123L993 131L1001 134L993 137L990 145L987 137L979 134L987 131Z" opacity="0.72">
      <animate attributeName="opacity" values="0.28;0.86;0.28" dur="4.3s" repeatCount="indefinite"/>
    </path>
    <path d="M1019 151L1021.5 157L1028 159.5L1021.5 162L1019 168L1016.5 162L1010 159.5L1016.5 157Z" opacity="0.64">
      <animate attributeName="opacity" values="0.18;0.72;0.18" dur="5.1s" repeatCount="indefinite"/>
    </path>
    <path d="M255 78L258 85L265 88L258 91L255 98L252 91L245 88L252 85Z" opacity="0.72"/>
    <circle cx="1038" cy="52" r="2.2">
      <animate attributeName="opacity" values="0.25;0.85;0.25" dur="3.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1098" cy="228" r="1.8" opacity="0.58"/>
    <circle cx="142" cy="182" r="1.7" opacity="0.5"/>
  </g>

  <g opacity="0.6">
    <circle cx="188" cy="68" r="4" fill="#37d5ff">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1012" cy="286" r="5" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.2;1" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="928" cy="84" r="3.5" fill="#a78bfa">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#softGlow)">
    <path d="M185 246C292 115 405 132 504 190C617 257 736 262 861 119C906 68 958 48 1014 49"
          stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" opacity="0.88">
      <animate attributeName="stroke-dasharray" values="18 20;80 24;18 20" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="600" y="112" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="600"
        fill="#94a3b8" letter-spacing="3">
    PENGYI PENG
  </text>

  <text x="600" y="184" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800"
        fill="#f8fafc">
    AI x Quant x Finance
    <animate attributeName="opacity" values="0.88;1;0.88" dur="4.5s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="230" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500"
        fill="#cbd5e1">
    Research workflows · Agent systems · Market intelligence
  </text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650">
    <rect x="316" y="270" width="150" height="42" rx="21" fill="#0f2a3b" stroke="#37d5ff" stroke-opacity="0.55"/>
    <text x="391" y="297" text-anchor="middle" fill="#e0f2fe">Quant</text>

    <rect x="500" y="270" width="110" height="42" rx="21" fill="#241a3f" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="555" y="297" text-anchor="middle" fill="#ede9fe">AI</text>

    <rect x="644" y="270" width="160" height="42" rx="21" fill="#10291d" stroke="#22c55e" stroke-opacity="0.55"/>
    <text x="724" y="297" text-anchor="middle" fill="#dcfce7">Finance</text>
  </g>
</svg>
